version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: 7
      time: "00:05"
      timezone: "Europe/Berlin"
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - hualex70
    versioning-strategy: "increase"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: 7
      time: "00:05"
      timezone: "Europe/Berlin"
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - hualex70